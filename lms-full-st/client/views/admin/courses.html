<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .course-section {
            margin-top: 2rem;
        }
        .course-section h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Manage Courses</h1>

        <!-- Course Management Section -->
        <div class="course-section">
            <h2>Available Courses</h2>
            <ul class="list-group">
                <li class="list-group-item">Course 1</li>
                <li class="list-group-item">Course 2</li>
                <li class="list-group-item">Course 3</li>
            </ul>
        </div>

        <!-- Video Section -->
        <div class="course-section">
            <h2>Course Video</h2>
            <div class="ratio ratio-16x9">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" allowfullscreen></iframe>
            </div>
            <p class="mt-3">This is a sample course video. Replace the video URL with the course-specific video link.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
