<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dashboard-section {
            margin-top: 2rem;
        }
        .dashboard-section h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Admin Dashboard</h1>

        <!-- Dashboard Overview Section -->
        <div class="dashboard-section">
            <h2>Overview</h2>
            <p>Welcome to the admin dashboard. Here you can manage users, courses, and view analytics.</p>
        </div>

        <!-- Video Section -->
        <div class="dashboard-section">
            <h2>Dashboard Tutorial</h2>
            <div class="ratio ratio-16x9">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" allowfullscreen></iframe>
            </div>
            <p class="mt-3">This is a sample tutorial video. Replace the video URL with relevant content.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
