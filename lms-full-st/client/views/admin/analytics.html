<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chart-section {
            margin-top: 2rem;
        }
        .chart-section h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Admin Analytics</h1>

        <!-- Analytics Overview Section -->
        <div class="mt-4">
            <h2>Overview</h2>
            <p>View detailed analytics about user activity, course performance, and more.</p>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <h2>Performance Charts</h2>
            <div class="ratio ratio-16x9">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" allowfullscreen></iframe>
            </div>
            <p class="mt-3">This is a sample analytics video. Replace the video URL with relevant content.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
