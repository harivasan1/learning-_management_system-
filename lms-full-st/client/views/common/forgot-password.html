<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>Forgot Password | EduLearn LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/x-icon" href="/public/assets/favicon.ico">
</head>
<body>
  <div class="landing-container">
    <div class="login-card">
      <div class="row g-0">
        <div class="col-md-5 login-left">
          <div class="brand-logo">
            <i class="fas fa-graduation-cap"></i> EduLearn LMS
          </div>
          <h3 class="mb-4">Forgot Password?</h3>
          <p class="mb-4">Enter your email address and we'll send you a link to reset your password.</p>
          <ul class="feature-list small">
            <li>Secure reset process</li>
            <li>Valid for 15 minutes</li>
            <li>No account access required</li>
          </ul>
        </div>
        <div class="col-md-7 login-right">
          <form id="forgotForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="email" autocomplete="email" placeholder="your@email.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
              <div class="invalid-feedback">Please provide a valid email address.</div>
            </div>
            <div id="forgotError" class="error-text alert alert-danger" style="display:none;" role="alert"></div>
            <div id="forgotSuccess" class="alert alert-success" style="display:none;" role="alert">
              <i class="fas fa-check-circle me-2"></i>Reset link sent! Check your email.
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3" id="forgotBtn">
              <span class="btn-text">Send Reset Link</span>
              <span class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
            <div class="text-center">
              <a href="/" class="me-3 text-decoration-none">← Back to Sign In</a>
              <a href="/register" class="text-decoration-none">Create Account</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
  <script src="/js/auth.js" defer></script>
  <script>
    // Forgot password form handler
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      const spinner = btn.querySelector('.spinner-border');
      const btnText = btn.querySelector('.btn-text');
      const errorEl = document.getElementById('forgotError');
      const successEl = document.getElementById('forgotSuccess');
      const email = document.getElementById('email');
      
      // Validate form
      if (!email.checkValidity()) {
        email.classList.add('is-invalid');
        return;
      }
      
      // Show loading
      btnText.textContent = 'Sending...';
      spinner.classList.remove('d-none');
      btn.disabled = true;
      
      try {
        // Simulate API call (add real API_URL/auth/forgot-password)
        await new Promise(resolve => setTimeout(resolve, 1500));
        successEl.style.display = 'block';
        email.value = '';
        errorEl.style.display = 'none';
      } catch (error) {
        errorEl.textContent = 'Failed to send reset link. Try again.';
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      } finally {
        spinner.classList.add('d-none');
        btnText.textContent = 'Send Reset Link';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
